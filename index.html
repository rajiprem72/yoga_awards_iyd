<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Awards IYD 2026</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#000,#4a3200,#000);
}

header h1{
  font-size:clamp(28px,6vw,62px);
  color:#ffd86b;
}

header p{
  margin:6px 0;
}

/* HERO BANNER */
.hero{
  width:100%;
  min-height:85vh;
  background:url('banner.png') center center / cover no-repeat;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* Dark overlay */
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
}

.hero h2{
  font-size:clamp(28px,5vw,58px);
  color:#fff;
  margin-bottom:15px;
}

.hero p{
  font-size:clamp(16px,2vw,24px);
  color:#f5f5f5;
  margin-bottom:25px;
}

.btn-group{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  background:#ffd86b;
  color:#000;
  padding:14px 26px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
}

/* MOBILE */
@media(max-width:768px){

.hero{
   min-height:65vh;
   background-position:center top;
}

.hero h2{
   line-height:1.2;
}

.btn{
   width:100%;
   max-width:260px;
}
}
</style>
</head>

<body>

<header>
<p>12th International Yoga Day – 2026</p>
<h1>YOGA AWARDS</h1>
<p>13th Year Award Ceremony</p>
</header>

<section class="hero">
   <div class="hero-content">
      <h2>Prestigious Yoga Awards Honouring the Great</h2>
      <p>Celebrating Excellence in Yoga, Siddha, Ayurveda & Holistic Wellness</p>

      <div class="btn-group">
         <a href="#form" class="btn">Apply Online</a>
         <a href="#terms" class="btn">Eligibility</a>
      </div>
   </div>
</section>

</body>
</html>
